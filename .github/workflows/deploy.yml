name: Деплой на GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Не запускаем два деплоя параллельно, но и не отменяем уже идущий на прод
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Установка зависимостей
        run: npm ci

      - name: Проверка типов
        run: npm run typecheck

      - name: Юнит-тесты
        run: npm run test

      - name: Сборка
        run: npm run build

      - name: Подготовка Pages
        uses: actions/configure-pages@v5

      - name: Загрузка артефакта сборки
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Деплой на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
