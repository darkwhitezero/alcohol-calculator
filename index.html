<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Бухлометр — калькулятор алкоголя в крови. Рассчитывает промилле и время до вытрезвления по формуле Видмарка-Зайдля с учётом пола, веса, роста и напитков.">
    <meta name="theme-color" content="#1a1a1a">

    <title>Бухлометр — калькулятор алкоголя в крови</title>

    <!-- Путь без ведущего слэша — Vite сам подставит правильный base-path
         (при "%BASE_URL%" + абсолютном пути Vite задваивает префикс в dev-режиме) -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="canonical" href="https://darkwhitezero.github.io/alcohol-calculator/">

    <!-- Шрифт заголовка — это LCP-текст, поэтому предзагружаем именно его
         (только кириллический подсет: в заголовке нет латинских символов) -->
    <link rel="preload" as="font" type="font/woff2" href="/src/assets/fonts/playfair-display-900-cyrillic.woff2" crossorigin>

    <!-- Open Graph — чтобы ссылка красиво разворачивалась в мессенджерах и соцсетях -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Бухлометр — калькулятор алкоголя в крови">
    <meta property="og:description"
        content="Считает промилле и время до вытрезвления по формуле Видмарка-Зайдля. Не медицинский и не юридический инструмент.">
    <meta property="og:url" content="https://darkwhitezero.github.io/alcohol-calculator/">
    <meta property="og:image" content="https://darkwhitezero.github.io/alcohol-calculator/og-preview.png">
    <meta property="og:locale" content="ru_RU">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Бухлометр — калькулятор алкоголя в крови">
    <meta name="twitter:description" content="Промилле и время до вытрезвления по формуле Видмарка-Зайдля.">
    <meta name="twitter:image" content="https://darkwhitezero.github.io/alcohol-calculator/og-preview.png">
</head>

<body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
